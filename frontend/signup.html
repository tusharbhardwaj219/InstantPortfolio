<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Instant Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toast-container"></div>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">&#9670;</span>
        <span>Instant<span class="logo-accent">Portfolio</span></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="about.html">About</a></li>
        <li><a href="index.html#features">Features</a></li>
        <li><a href="index.html#pricing">Pricing</a></li>
        <li class="nav-mobile-auth"><a href="login.html">Log In</a></li>
        <li class="nav-mobile-auth"><a href="signup.html" class="nav-signup-link" style="color:var(--text-bright)">Sign Up Free</a></li>
      </ul>
      <div class="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-nav">Log In</a>
      </div>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== AUTH BG ===== -->
  <div class="auth-bg">
    <div class="auth-orb auth-orb--1"></div>
    <div class="auth-orb auth-orb--2"></div>
    <div class="auth-grid"></div>
  </div>

  <!-- ===== SIGNUP FORM ===== -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>

      <!-- Social Auth -->
      <div class="social-auth">
        <button class="social-btn" id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
        <button class="social-btn" id="githubBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          Sign up with GitHub
        </button>
      </div>

      <div class="auth-divider">or sign up with email</div>

      <!-- Signup Form -->
      <form class="auth-form" id="signupForm" novalidate>
        <div class="form-row-split">
          <div class="form-group">
            <label class="form-label" for="firstName">First name</label>
            <input
              class="form-input"
              type="text"
              id="firstName"
              name="firstName"
              placeholder="Alex"
              autocomplete="given-name"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last name</label>
            <input
              class="form-input"
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Chen"
              autocomplete="family-name"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
              minlength="8"
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            >
            <button type="button" class="toggle-password" id="toggleConfirm" aria-label="Toggle password visibility">
              <svg id="eyeIcon2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="form-check" style="margin-top:2px">
          <input type="checkbox" id="agreeTerms" required>
          I agree to the <a href="#" style="color:var(--accent);font-weight:500;margin-left:4px">Terms of Service</a>&nbsp;and&nbsp;<a href="#" style="color:var(--accent);font-weight:500">Privacy Policy</a>
        </label>

        <button type="submit" class="btn btn-primary auth-submit" style="margin-top:10px">
          <span class="btn-glow"></span>
          Create Free Account
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <p class="auth-terms" style="margin-top:20px">
        No credit card required. Free plan includes 1 portfolio forever.
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="script.js"></script>
  <script>
    function showToastLocal(msg, isError) {
      const tc = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast' + (isError ? '' : ' success');
      t.innerHTML = isError
        ? '<span style="color:#ff6b6b;font-size:1.1rem">⚠</span> ' + msg
        : '<span class="toast-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> ' + msg;
      tc.appendChild(t);
      setTimeout(() => { t.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    // Password toggles
    function makeToggle(btnId, inputId, iconId) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (!btn) return;
      btn.addEventListener('click', () => {
        const hidden = input.type === 'password';
        input.type = hidden ? 'text' : 'password';
        icon.innerHTML = hidden
          ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      });
    }
    makeToggle('togglePassword', 'password', 'eyeIcon');
    makeToggle('toggleConfirm', 'confirmPassword', 'eyeIcon2');

    // Form submission — creates a real account via the backend API
    const signupBtnHtml = '<span class="btn-glow"></span> Create Free Account <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const agreed = document.getElementById('agreeTerms').checked;

      if (!firstName || !lastName || !email || !password) {
        showToastLocal('Please fill in all fields.', true); return;
      }
      if (password.length < 8) {
        showToastLocal('Password must be at least 8 characters.', true); return;
      }
      if (password !== confirm) {
        showToastLocal('Passwords do not match.', true); return;
      }
      if (!agreed) {
        showToastLocal('Please agree to the Terms of Service.', true); return;
      }

      const btn = e.target.querySelector('.auth-submit');
      btn.innerHTML = '<span class="btn-glow"></span><div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite"></div> Creating account...';
      btn.disabled = true;

      try {
        const payload = await IP_API.signup({ firstName, lastName, email, password });
        IP_API.setSession(payload.data.token, payload.data.user);
        showToastLocal('Account created! Welcome to Instant Portfolio.', false);
        setTimeout(() => { window.location.href = 'index.html#upload'; }, 700);
      } catch (err) {
        if (err.status) {
          const detail = err.errors && err.errors[0] ? ` — ${err.errors[0].message}` : '';
          showToastLocal(err.message + detail, true);
        } else {
          showToastLocal('Cannot reach the server. Is the backend running on port 5000?', true);
        }
        btn.innerHTML = signupBtnHtml;
        btn.disabled = false;
      }
    });

    // Social auth — not implemented yet
    document.getElementById('googleBtn').addEventListener('click', () => {
      showToastLocal('Google sign-up is not available yet — use email & password.', true);
    });
    document.getElementById('githubBtn').addEventListener('click', () => {
      showToastLocal('GitHub sign-up is not available yet — use email & password.', true);
    });
  </script>
</body>
</html>
